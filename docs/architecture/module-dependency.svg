<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450" font-family="Segoe UI, sans-serif">
  <defs>
    <marker id="dep" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <text x="350" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">Module Dependency Diagram</text>

  <!-- app.py -->
  <rect x="250" y="60" width="200" height="50" rx="10" fill="#4a6cf7" stroke="#3a5ce5" stroke-width="2"/>
  <text x="350" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">app.py (Streamlit)</text>

  <!-- Core modules -->
  <rect x="50" y="180" width="140" height="50" rx="8" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  <text x="120" y="210" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">db_reader.py</text>

  <rect x="220" y="180" width="160" height="50" rx="8" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  <text x="300" y="210" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">prompt_builder.py</text>

  <rect x="410" y="180" width="160" height="50" rx="8" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  <text x="490" y="210" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">image_generator.py</text>

  <rect x="600" y="180" width="80" height="50" rx="8" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  <text x="640" y="210" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">logger.py</text>

  <!-- app.py -> core modules -->
  <line x1="280" y1="110" x2="120" y2="180" stroke="#555" stroke-width="1.5" marker-end="url(#dep)"/>
  <line x1="320" y1="110" x2="300" y2="180" stroke="#555" stroke-width="1.5" marker-end="url(#dep)"/>
  <line x1="380" y1="110" x2="490" y2="180" stroke="#555" stroke-width="1.5" marker-end="url(#dep)"/>
  <line x1="420" y1="110" x2="640" y2="180" stroke="#555" stroke-width="1.5" marker-end="url(#dep)"/>

  <!-- Config layer -->
  <rect x="180" y="300" width="140" height="45" rx="8" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
  <text x="250" y="327" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">settings.py</text>

  <rect x="350" y="300" width="140" height="45" rx="8" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
  <text x="420" y="327" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">models.yaml</text>

  <!-- YAML Templates -->
  <rect x="100" y="390" width="120" height="40" rx="8" fill="#e67e22" stroke="#d35400" stroke-width="1.5"/>
  <text x="160" y="415" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">styles.yaml</text>

  <rect x="240" y="390" width="160" height="40" rx="8" fill="#e67e22" stroke="#d35400" stroke-width="1.5"/>
  <text x="320" y="415" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">category_context.yaml</text>

  <rect x="420" y="390" width="140" height="40" rx="8" fill="#e67e22" stroke="#d35400" stroke-width="1.5"/>
  <text x="490" y="415" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">base_prompt.yaml</text>

  <!-- Dependencies to config -->
  <line x1="350" y1="110" x2="250" y2="300" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#dep)"/>
  <line x1="490" y1="230" x2="420" y2="300" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#dep)"/>
  <line x1="300" y1="230" x2="160" y2="390" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#dep)"/>
  <line x1="300" y1="230" x2="320" y2="390" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#dep)"/>
  <line x1="300" y1="230" x2="490" y2="390" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#dep)"/>

  <!-- External services -->
  <rect x="30" y="300" width="120" height="45" rx="8" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="90" y="327" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Supabase API</text>
  <line x1="120" y1="230" x2="90" y2="300" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#dep)"/>

  <rect x="530" y="300" width="150" height="45" rx="8" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="605" y="320" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Google / OpenAI</text>
  <text x="605" y="336" text-anchor="middle" font-size="9" fill="#fff">AI Image APIs</text>
  <line x1="490" y1="230" x2="605" y2="300" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#dep)"/>

  <!-- Legend -->
  <rect x="560" y="60" width="130" height="80" rx="6" fill="#f9f9f9" stroke="#ddd" stroke-width="1"/>
  <text x="625" y="78" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">범례</text>
  <line x1="570" y1="92" x2="600" y2="92" stroke="#555" stroke-width="1.5" marker-end="url(#dep)"/>
  <text x="610" y="96" font-size="9" fill="#666">의존</text>
  <line x1="570" y1="110" x2="600" y2="110" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="610" y="114" font-size="9" fill="#666">설정 참조</text>
  <line x1="570" y1="128" x2="600" y2="128" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="610" y="132" font-size="9" fill="#666">외부 API</text>
</svg>
