<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Segoe UI, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">Thumbnail BG Generator - System Architecture</text>

  <!-- Streamlit UI Layer -->
  <rect x="50" y="60" width="800" height="100" rx="12" fill="#f0f4ff" stroke="#4a6cf7" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#4a6cf7">Streamlit Web UI (app.py)</text>
  <rect x="80" y="100" width="140" height="40" rx="6" fill="#fff" stroke="#4a6cf7" stroke-width="1"/>
  <text x="150" y="125" text-anchor="middle" font-size="11" fill="#333">강의 검색/선택</text>
  <rect x="240" y="100" width="140" height="40" rx="6" fill="#fff" stroke="#4a6cf7" stroke-width="1"/>
  <text x="310" y="125" text-anchor="middle" font-size="11" fill="#333">스타일/모델 선택</text>
  <rect x="400" y="100" width="140" height="40" rx="6" fill="#fff" stroke="#4a6cf7" stroke-width="1"/>
  <text x="470" y="125" text-anchor="middle" font-size="11" fill="#333">프롬프트 미리보기</text>
  <rect x="560" y="100" width="140" height="40" rx="6" fill="#fff" stroke="#4a6cf7" stroke-width="1"/>
  <text x="630" y="125" text-anchor="middle" font-size="11" fill="#333">이미지 비교/선택</text>
  <rect x="720" y="100" width="110" height="40" rx="6" fill="#fff" stroke="#4a6cf7" stroke-width="1"/>
  <text x="775" y="125" text-anchor="middle" font-size="11" fill="#333">저장/로깅</text>

  <!-- Arrow: UI -> Core -->
  <line x1="450" y1="160" x2="450" y2="200" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Core Engine Layer -->
  <rect x="50" y="205" width="800" height="200" rx="12" fill="#f0fff4" stroke="#2ecc71" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="230" text-anchor="middle" font-size="14" font-weight="bold" fill="#27ae60">Core Engine</text>

  <!-- DB Reader -->
  <rect x="80" y="250" width="170" height="70" rx="8" fill="#fff" stroke="#27ae60" stroke-width="1.5"/>
  <text x="165" y="275" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">DB Reader</text>
  <text x="165" y="295" text-anchor="middle" font-size="10" fill="#666">core/db_reader.py</text>
  <text x="165" y="310" text-anchor="middle" font-size="9" fill="#999">Supabase 읽기 전용</text>

  <!-- Prompt Builder -->
  <rect x="280" y="250" width="170" height="70" rx="8" fill="#fff" stroke="#27ae60" stroke-width="1.5"/>
  <text x="365" y="275" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Prompt Builder</text>
  <text x="365" y="295" text-anchor="middle" font-size="10" fill="#666">core/prompt_builder.py</text>
  <text x="365" y="310" text-anchor="middle" font-size="9" fill="#999">템플릿 + DB → 프롬프트</text>

  <!-- Image Generator -->
  <rect x="480" y="250" width="170" height="70" rx="8" fill="#fff" stroke="#27ae60" stroke-width="1.5"/>
  <text x="565" y="275" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Image Generator</text>
  <text x="565" y="295" text-anchor="middle" font-size="10" fill="#666">core/image_generator.py</text>
  <text x="565" y="310" text-anchor="middle" font-size="9" fill="#999">Gemini / Imagen / OpenAI</text>

  <!-- Logger -->
  <rect x="680" y="250" width="150" height="70" rx="8" fill="#fff" stroke="#27ae60" stroke-width="1.5"/>
  <text x="755" y="275" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Logger</text>
  <text x="755" y="295" text-anchor="middle" font-size="10" fill="#666">core/logger.py</text>
  <text x="755" y="310" text-anchor="middle" font-size="9" fill="#999">JSONL 이력 기록</text>

  <!-- Arrows between core modules -->
  <line x1="250" y1="285" x2="280" y2="285" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="285" x2="480" y2="285" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="650" y1="285" x2="680" y2="285" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Config Layer -->
  <rect x="80" y="340" width="340" height="50" rx="8" fill="#fffbe6" stroke="#f39c12" stroke-width="1.5"/>
  <text x="250" y="365" text-anchor="middle" font-size="11" font-weight="bold" fill="#e67e22">YAML Config</text>
  <text x="250" y="380" text-anchor="middle" font-size="9" fill="#999">models.yaml | styles.yaml | category_context.yaml | base_prompt.yaml</text>

  <!-- External Services -->
  <rect x="50" y="440" width="800" height="150" rx="12" fill="#fff5f5" stroke="#e74c3c" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="465" text-anchor="middle" font-size="14" font-weight="bold" fill="#e74c3c">External Services</text>

  <!-- Supabase -->
  <rect x="80" y="480" width="170" height="80" rx="8" fill="#fff" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="165" y="510" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Supabase</text>
  <text x="165" y="528" text-anchor="middle" font-size="10" fill="#666">PostgreSQL DB</text>
  <text x="165" y="546" text-anchor="middle" font-size="9" fill="#999">packt_products 테이블</text>

  <!-- Google AI -->
  <rect x="290" y="480" width="170" height="80" rx="8" fill="#fff" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="375" y="510" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Google AI</text>
  <text x="375" y="528" text-anchor="middle" font-size="10" fill="#666">Gemini API</text>
  <text x="375" y="546" text-anchor="middle" font-size="9" fill="#999">NB2 / NB Pro / NB / Imagen</text>

  <!-- OpenAI -->
  <rect x="500" y="480" width="170" height="80" rx="8" fill="#fff" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="585" y="510" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">OpenAI</text>
  <text x="585" y="528" text-anchor="middle" font-size="10" fill="#666">Images API</text>
  <text x="585" y="546" text-anchor="middle" font-size="9" fill="#999">GPT Image / DALL-E 3</text>

  <!-- Local Storage -->
  <rect x="710" y="480" width="120" height="80" rx="8" fill="#fff" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="770" y="510" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Local FS</text>
  <text x="770" y="528" text-anchor="middle" font-size="10" fill="#666">output/</text>
  <text x="770" y="546" text-anchor="middle" font-size="9" fill="#999">PNG + JSONL logs</text>

  <!-- Arrows: Core -> External -->
  <line x1="165" y1="405" x2="165" y2="480" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <line x1="565" y1="405" x2="375" y2="480" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <line x1="565" y1="405" x2="585" y2="480" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <line x1="755" y1="405" x2="770" y2="480" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
</svg>
