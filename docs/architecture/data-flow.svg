<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Segoe UI, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">Data Flow Diagram</text>

  <!-- Step 1: Supabase -->
  <rect x="30" y="70" width="140" height="70" rx="10" fill="#e8f4fd" stroke="#3498db" stroke-width="2"/>
  <text x="100" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#2980b9">Supabase DB</text>
  <text x="100" y="118" text-anchor="middle" font-size="10" fill="#666">packt_products</text>

  <line x1="170" y1="105" x2="210" y2="105" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2: DB Reader -->
  <rect x="215" y="70" width="120" height="70" rx="10" fill="#e8f8f5" stroke="#1abc9c" stroke-width="2"/>
  <text x="275" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#16a085">DB Reader</text>
  <text x="275" y="118" text-anchor="middle" font-size="10" fill="#666">강의 데이터 조회</text>

  <line x1="335" y1="105" x2="375" y2="105" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3: Prompt Builder -->
  <rect x="380" y="60" width="150" height="90" rx="10" fill="#fef9e7" stroke="#f1c40f" stroke-width="2"/>
  <text x="455" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#d4ac0d">Prompt Builder</text>
  <text x="455" y="108" text-anchor="middle" font-size="10" fill="#666">스타일 + 카테고리</text>
  <text x="455" y="123" text-anchor="middle" font-size="10" fill="#666">+ 키워드 + 규칙</text>
  <text x="455" y="140" text-anchor="middle" font-size="10" fill="#999">→ 최종 프롬프트</text>

  <!-- YAML Templates input -->
  <rect x="380" y="180" width="150" height="45" rx="8" fill="#fffbe6" stroke="#f39c12" stroke-width="1.5"/>
  <text x="455" y="200" text-anchor="middle" font-size="10" font-weight="bold" fill="#e67e22">YAML Templates</text>
  <text x="455" y="215" text-anchor="middle" font-size="9" fill="#999">styles / category / base</text>
  <line x1="455" y1="180" x2="455" y2="150" stroke="#f39c12" stroke-width="1.5" marker-end="url(#arr)"/>

  <line x1="530" y1="105" x2="570" y2="105" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4: User Edit -->
  <rect x="575" y="70" width="130" height="70" rx="10" fill="#f4ecf7" stroke="#8e44ad" stroke-width="2"/>
  <text x="640" y="95" text-anchor="middle" font-size="12" font-weight="bold" fill="#7d3c98">사용자 편집</text>
  <text x="640" y="113" text-anchor="middle" font-size="10" fill="#666">프롬프트 수정</text>
  <text x="640" y="128" text-anchor="middle" font-size="10" fill="#999">(선택사항)</text>

  <line x1="705" y1="105" x2="745" y2="105" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 5: Image Generator -->
  <rect x="750" y="60" width="130" height="90" rx="10" fill="#fdedec" stroke="#e74c3c" stroke-width="2"/>
  <text x="815" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">Image Generator</text>
  <text x="815" y="108" text-anchor="middle" font-size="10" fill="#666">API 호출</text>
  <text x="815" y="123" text-anchor="middle" font-size="10" fill="#999">모델별 N장 생성</text>

  <!-- AI APIs -->
  <rect x="750" y="180" width="130" height="95" rx="8" fill="#fff5f5" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="815" y="200" text-anchor="middle" font-size="10" font-weight="bold" fill="#c0392b">AI APIs</text>
  <text x="815" y="218" text-anchor="middle" font-size="9" fill="#666">Nano Banana 2</text>
  <text x="815" y="233" text-anchor="middle" font-size="9" fill="#666">Nano Banana Pro</text>
  <text x="815" y="248" text-anchor="middle" font-size="9" fill="#666">Imagen 4.0</text>
  <text x="815" y="263" text-anchor="middle" font-size="9" fill="#666">GPT Image / DALL-E 3</text>
  <line x1="815" y1="180" x2="815" y2="150" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrow down to results -->
  <line x1="815" y1="150" x2="815" y2="310" stroke="#555" stroke-width="2"/>
  <line x1="815" y1="310" x2="640" y2="310" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 6: Compare -->
  <rect x="510" y="280" width="130" height="60" rx="10" fill="#eaf2f8" stroke="#2980b9" stroke-width="2"/>
  <text x="575" y="305" text-anchor="middle" font-size="12" font-weight="bold" fill="#2471a3">이미지 비교</text>
  <text x="575" y="323" text-anchor="middle" font-size="10" fill="#666">격자 뷰 (3열)</text>

  <line x1="510" y1="310" x2="460" y2="310" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 7: Select -->
  <rect x="330" y="280" width="130" height="60" rx="10" fill="#e8f8f5" stroke="#1abc9c" stroke-width="2"/>
  <text x="395" y="305" text-anchor="middle" font-size="12" font-weight="bold" fill="#16a085">최종 선택</text>
  <text x="395" y="323" text-anchor="middle" font-size="10" fill="#666">[선택] 버튼</text>

  <!-- Arrow to save -->
  <line x1="395" y1="340" x2="395" y2="380" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 8: Save -->
  <rect x="250" y="385" width="140" height="60" rx="10" fill="#e8f4fd" stroke="#3498db" stroke-width="2"/>
  <text x="320" y="410" text-anchor="middle" font-size="12" font-weight="bold" fill="#2980b9">이미지 저장</text>
  <text x="320" y="428" text-anchor="middle" font-size="10" fill="#666">{id}_thumbnail.png</text>

  <!-- Step 9: Log -->
  <rect x="430" y="385" width="140" height="60" rx="10" fill="#fef9e7" stroke="#f1c40f" stroke-width="2"/>
  <text x="500" y="410" text-anchor="middle" font-size="12" font-weight="bold" fill="#d4ac0d">이력 로깅</text>
  <text x="500" y="428" text-anchor="middle" font-size="10" fill="#666">generation_log.jsonl</text>

  <line x1="395" y1="415" x2="430" y2="415" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="395" y1="415" x2="390" y2="415" stroke="#555" stroke-width="1.5"/>
  <line x1="330" y1="340" x2="330" y2="385" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Legend -->
  <rect x="30" y="400" width="180" height="80" rx="8" fill="#f9f9f9" stroke="#ddd" stroke-width="1"/>
  <text x="120" y="420" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">범례</text>
  <line x1="45" y1="435" x2="75" y2="435" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="85" y="439" font-size="9" fill="#666">데이터 흐름</text>
  <line x1="45" y1="455" x2="75" y2="455" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="85" y="459" font-size="9" fill="#666">참조/연결</text>
  <line x1="45" y1="470" x2="75" y2="470" stroke="#f39c12" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="85" y="474" font-size="9" fill="#666">설정 입력</text>
</svg>
